# XcodeGen spec. 生成 Xcode 工程:
#     brew install xcodegen && xcodegen generate
# 之后打开 MacAsDisplay.xcodeproj 即可。
#
# 为什么用 XcodeGen:
#   - Swift-C++ Interop 在 Xcode app target 上比 SwiftPM 稳;
#   - pbxproj 纯文本难维护,用 YAML 作为唯一来源更清晰;
#   - 新增文件只需重跑 `xcodegen`,不用在 Xcode 里点来点去。
#
# xcodeproj 是派生物,不进 repo(见 .gitignore)。clone 后执行:
#     xcodegen generate && open MacAsDisplay.xcodeproj
#
# 单 target 架构:
#   从 v0.1.0 起,Sender / Receiver 合并成一个 app —— 两端都下载同一份
#   .app,首启时用户在 RoleChooser 里选 "Main Mac" 或 "Secondary Display",
#   持久化到 UserDefaults 之后 AppMain 按角色分发到对应 Delegate。
#   好处:零分发歧义(不用再跟用户解释"这边装 Sender 那边装 Receiver"),
#   PSK zero-config 天然复用,TCC 弹一次永不再问。

name: MacAsDisplay
options:
  bundleIdPrefix: xyz.dashuo.macasdisplay
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Config.xcconfig(gitignored)存在就吃进来,里面放本地签名身份。
# 有身份 = TCC 权限跨 rebuild 永久保留;没有就 fallback 到 adhoc(每次问一遍)。
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

    # ---------- C++ 标准 ----------
    CLANG_CXX_LANGUAGE_STANDARD: "c++20"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu17"

    # ---------- Swift ↔ C++ Interop ----------
    SWIFT_OBJC_INTEROP_MODE: "objcxx"
    OTHER_SWIFT_FLAGS: "$(inherited) -cxx-interoperability-mode=default"

    # ---------- 签名 ----------
    # 详细说明见仓库 Config.xcconfig.example。
    # 签名 identity(CODE_SIGN_IDENTITY / DEVELOPMENT_TEAM / CODE_SIGN_STYLE)
    # 不在这里设置,放 Config.xcconfig —— buildSettings 优先级高于 xcconfig,
    # 写这里会覆盖掉用户的本地签名配置。
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    ENABLE_HARDENED_RUNTIME: NO

    # ---------- 警告 ----------
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    GCC_WARN_ABOUT_MISSING_NEWLINE: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

configs:
  Debug: debug
  Release: release

targets:

  # ========================================================
  # MacAsDisplay —— 合并 app(Main Mac + Secondary Display)
  # ========================================================
  MacAsDisplay:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "MacAsDisplay.entitlements"
          - "MacAsDisplay-Bridging-Header.h"
          - "Assets.xcassets"
      - path: App/Assets.xcassets
      - path: Sender
        excludes:
          - "Info.plist"
          - "Sender.entitlements"
          - "Sender-Bridging-Header.h"
      - path: Receiver
        excludes:
          - "Info.plist"
          - "Receiver.entitlements"
          - "Receiver-Bridging-Header.h"
      - path: Shared
      # lproj 目录被 xcodegen 识别为 variant group,打进 .app 的 Contents/Resources/<lang>.lproj/
      # 下,macOS 按系统语言自动选。添新语言只要建 Resources/<lang>.lproj/Localizable.strings。
      - path: Resources/en.lproj/Localizable.strings
      - path: Resources/zh-Hans.lproj/Localizable.strings
    settings:
      base:
        PRODUCT_NAME: "MacAsDisplay"
        PRODUCT_BUNDLE_IDENTIFIER: "xyz.dashuo.macasdisplay"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        INFOPLIST_FILE: "App/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "App/MacAsDisplay.entitlements"
        SWIFT_OBJC_BRIDGING_HEADER: "App/MacAsDisplay-Bridging-Header.h"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Shared/Cpp"
          - "$(SRCROOT)/Sender/Cpp"
          - "$(SRCROOT)/Sender/ObjC"
          - "$(SRCROOT)/Receiver/Cpp"
        OTHER_LDFLAGS: "$(inherited)"
