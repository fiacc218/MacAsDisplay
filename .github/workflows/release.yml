# Release CI —— push tag (v*) 触发,构建 Sender + Receiver 的 Universal .app,
# 打 zip,发 GitHub Release。
#
# 为什么 macos-14 runner:
#   - 自带 Xcode 15+,满足 project.yml 的 MACOSX_DEPLOYMENT_TARGET=14.0
#   - 原生 arm64 runner,交叉编译 x86_64 有工具链自带 SDK
#
# 为什么 Universal (arm64 + x86_64):
#   - Receiver 目标机器可能是任意老 Mac(Intel 或 Apple Silicon)
#   - 一个 .app 覆盖所有场景,install.sh 不用分架构
#
# 签名:
#   - 使用 ad-hoc (CODE_SIGN_IDENTITY=-),零账号依赖
#   - 用户下载后 install.sh 会 `xattr -dr com.apple.quarantine` + 本地 ad-hoc 重签
#
# 触发:
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发测试

permissions:
  contents: write  # 发 Release 要写权限

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        # xcodegen 默认输出的 pbxproj 用 format 77 (Xcode 16+),
        # 老版 Xcode 读不了,所以锁最新稳定版。
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Ensure Config.xcconfig exists
        # 本地 gitignored (放签名身份),CI 上不存在 → xcodegen 校验失败。
        # 留空即可,下面 xcodebuild 命令行显式 CODE_SIGN_IDENTITY=- 覆盖。
        run: touch Config.xcconfig

      - name: Generate xcodeproj
        run: xcodegen generate

      - name: Build Sender (Universal, Release)
        run: |
          xcodebuild -scheme Sender -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO \
            build

      - name: Build Receiver (Universal, Release)
        run: |
          xcodebuild -scheme Receiver -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO \
            build

      - name: Verify architectures
        run: |
          echo "=== Sender ==="
          lipo -info build/Build/Products/Release/MacAsDisplaySender.app/Contents/MacOS/MacAsDisplaySender
          echo "=== Receiver ==="
          lipo -info build/Build/Products/Release/MacAsDisplayReceiver.app/Contents/MacOS/MacAsDisplayReceiver

      - name: Package zips
        working-directory: build/Build/Products/Release
        run: |
          # ditto 保留 code signature + extended attributes,比 zip 更适合 .app
          ditto -c -k --keepParent MacAsDisplaySender.app MacAsDisplaySender.zip
          ditto -c -k --keepParent MacAsDisplayReceiver.app MacAsDisplayReceiver.zip
          shasum -a 256 *.zip > SHA256SUMS.txt
          ls -lh *.zip SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            build/Build/Products/Release/MacAsDisplaySender.zip
            build/Build/Products/Release/MacAsDisplayReceiver.zip
            build/Build/Products/Release/SHA256SUMS.txt
          body: |
            ## Install

            **在 Receiver (老 Mac) 上一行安装**:
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **在 Sender (主 Mac) 上手动安装**:
            下载 `MacAsDisplaySender.zip` → 解压 → 拖到 /Applications → 右键 Open。

            完整说明: [README](https://github.com/${{ github.repository }}#readme)

            ---
            Ad-hoc 签名的 Universal 二进制 (arm64 + x86_64)。
            SHA256 校验见 `SHA256SUMS.txt`。

      # 非 tag 触发(workflow_dispatch)时,artifact 上传做烟测
      - name: Upload artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macasdisplay-${{ github.sha }}
          path: |
            build/Build/Products/Release/MacAsDisplaySender.zip
            build/Build/Products/Release/MacAsDisplayReceiver.zip
            build/Build/Products/Release/SHA256SUMS.txt
